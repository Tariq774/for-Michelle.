<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For My Love ❤️</title>
  <style>
    body {
      background-color: #ffe6f0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      text-align: center;
      padding: 50px;
      color: #d6336c;
      overflow: hidden;
    }
    h1 {
      font-size: 3em;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.5em;
      margin: 15px 0;
    }
    .love {
      font-size: 3em;
      font-weight: bold;
      color: #ff0033;
      margin-top: 40px;
    }
    /* Floating hearts */
    .heart {
      position: absolute;
      bottom: -50px;
      font-size: 2em;
      color: #ff3366;
      animation: floatUp 6s linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
    }
    /* Cute play button */
    .play-btn {
      background-color: #ff3366;
      border: none;
      color: white;
      padding: 15px 30px;
      font-size: 1.2em;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }
    .play-btn:hover {
      transform: scale(1.1);
      background-color: #ff0033;
    }
  </style>
</head>
<body>
  <h1>💖 Hey Beautiful 💖</h1>
  <p>You make my world brighter 🌸</p>
  <p>Every day with you is special ✨</p>
  <p class="love">I Love You so much Michelle💕</p>

  <!-- Background music -->
  <audio id="bg-music" loop>
    <source src="your-song.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <!-- Play button -->
  <button class="play-btn" onclick="document.getElementById('bg-music').play()">❤️ Play Our Song 🎶</button>

  <!-- Floating hearts -->
  <script>
    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerText = "❤️";
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.animationDuration = (4 + Math.random() * 3) + "s";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createHeart, 500);
  </script>
</body>
</html>
