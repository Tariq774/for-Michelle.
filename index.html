<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Michelle ❤️</title>

  <style>
    body {
      background: linear-gradient(to bottom, #ffe6f0, #fff);
      font-family: 'Comic Sans MS', cursive, sans-serif;
      text-align: center;
      padding: 30px;
      color: #d6336c;
      overflow: hidden;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    #type-text {
      font-size: 1.4em;
      margin: 20px 0;
      min-height: 50px;
    }

    .love {
      font-size: 2.5em;
      font-weight: bold;
      color: #ff0033;
      margin-top: 30px;
    }

    img {
      width: 180px;
      border-radius: 20px;
      margin-top: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .btn {
      background-color: #ff3366;
      border: none;
      color: white;
      padding: 12px 25px;
      font-size: 1em;
      border-radius: 25px;
      cursor: pointer;
      margin: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .btn:hover {
      transform: scale(1.1);
      background-color: #ff0033;
    }

    /* Hearts */
    .heart {
      position: absolute;
      bottom: -50px;
      font-size: 1.8em;
      color: #ff3366;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }
  </style>
</head>

<body>

  <h1>💖 Hey Michelle 💖</h1>

  <!-- Typewriter text -->
  <div id="type-text"></div>

  <!-- Optional image -->
  <!-- Replace with your own image -->
  <img src="michelle.jpg" alt="Michelle">

  <p class="love">I Love You So Much 💕</p>

  <!-- Music -->
  <audio id="bg-music" loop>
    <source src="love-song.mp3" type="audio/mpeg">
  </audio>

  <!-- Buttons -->
  <div>
    <button class="btn" onclick="playMusic()">▶ Play</button>
    <button class="btn" onclick="pauseMusic()">⏸ Pause</button>
  </div>

  <script>
    // Music controls
    function playMusic() {
      document.getElementById("bg-music").play();
    }

    function pauseMusic() {
      document.getElementById("bg-music").pause();
    }

    // Typewriter effect
    const text = "You make my world brighter 💖 Every moment with you is special ✨ I’m so lucky to have you Michelle ❤️";
    let i = 0;

    function typeWriter() {
      if (i < text.length) {
        document.getElementById("type-text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 50);
      }
    }

    typeWriter();

    // Floating hearts
    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerText = "❤️";
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.animationDuration = (5 + Math.random() * 3) + "s";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 7000);
    }

    setInterval(createHeart, 800);
  </script>

</body>
</html>
